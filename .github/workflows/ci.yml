name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train quick artifact
        run: PYTHONPATH=src python -m bankruptcy_prediction.train --quick
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
      - name: Compile
        run: PYTHONPATH=src python -m compileall -q src tests api start.py
